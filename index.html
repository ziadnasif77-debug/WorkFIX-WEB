<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="WorkFix — On-demand home services marketplace">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>WorkFix</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* ============================================
   CSS CUSTOM PROPERTIES
   ============================================ */
:root {
  --c-primary: #2563eb;
  --c-primary-hover: #1d4ed8;
  --c-primary-light: #dbeafe;
  --c-secondary: #7c3aed;
  --c-success: #16a34a;
  --c-success-light: #dcfce7;
  --c-warning: #ea580c;
  --c-warning-light: #fff7ed;
  --c-danger: #dc2626;
  --c-danger-light: #fef2f2;
  --c-info: #0891b2;
  --c-info-light: #ecfeff;
  --c-bg: #f8fafc;
  --c-surface: #ffffff;
  --c-surface-hover: #f1f5f9;
  --c-border: #e2e8f0;
  --c-text: #0f172a;
  --c-text-secondary: #64748b;
  --c-text-muted: #94a3b8;
  --c-overlay: rgba(0,0,0,0.5);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
  --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.1);
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-xxl: 48px;
  --font-xs: 11px;
  --font-sm: 13px;
  --font-md: 15px;
  --font-lg: 18px;
  --font-xl: 22px;
  --font-xxl: 28px;
  --tab-height: 60px;
  --header-height: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

/* ============================================
   RESET & BASE
   ============================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  font-size:var(--font-md);color:var(--c-text);background:var(--c-bg);
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
html[dir="rtl"] body{font-family:'Segoe UI',Tahoma,'Noto Sans Arabic',Arial,sans-serif}
a{color:var(--c-primary);text-decoration:none}
input,textarea,select,button{font:inherit;color:inherit;border:none;outline:none;background:none}
img{max-width:100%;display:block}
ul,ol{list-style:none}

/* ============================================
   APP SHELL
   ============================================ */
#app{height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{
  display:none;flex-direction:column;height:100%;overflow:hidden;
  animation:fadeIn .2s ease;
}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Header */
.header{
  height:var(--header-height);padding:0 var(--space-md);
  display:flex;align-items:center;gap:var(--space-md);
  background:var(--c-surface);border-bottom:1px solid var(--c-border);
  flex-shrink:0;padding-top:var(--safe-top);position:relative;z-index:10;
}
.header-title{font-size:var(--font-lg);font-weight:700;flex:1}
.header-back{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-full);cursor:pointer;font-size:20px;
}
.header-back:hover{background:var(--c-surface-hover)}
.header-action{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-full);cursor:pointer;position:relative;
}
.header-action:hover{background:var(--c-surface-hover)}

/* Scrollable content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.content-padded{padding:var(--space-md)}

/* Bottom tabs */
.tab-bar{
  height:var(--tab-height);padding-bottom:var(--safe-bottom);
  display:flex;background:var(--c-surface);border-top:1px solid var(--c-border);
  flex-shrink:0;position:relative;z-index:10;
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;color:var(--c-text-muted);transition:color .15s;
  font-size:var(--font-xs);
}
.tab-item.active{color:var(--c-primary)}
.tab-item .tab-icon{font-size:22px;line-height:1}
.tab-item .tab-label{font-weight:500}

/* ============================================
   COMPONENTS
   ============================================ */

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:var(--space-sm);
  padding:12px 20px;border-radius:var(--radius-md);font-weight:600;
  cursor:pointer;transition:all .15s;font-size:var(--font-md);white-space:nowrap;
}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--c-primary);color:#fff}
.btn-primary:hover{background:var(--c-primary-hover)}
.btn-secondary{background:var(--c-surface);color:var(--c-text);border:1px solid var(--c-border)}
.btn-secondary:hover{background:var(--c-surface-hover)}
.btn-danger{background:var(--c-danger);color:#fff}
.btn-success{background:var(--c-success);color:#fff}
.btn-ghost{color:var(--c-primary)}
.btn-ghost:hover{background:var(--c-primary-light)}
.btn-full{width:100%}
.btn:disabled{opacity:.5;pointer-events:none}
.btn-sm{padding:8px 14px;font-size:var(--font-sm)}
.btn-lg{padding:14px 24px;font-size:var(--font-lg)}

/* Inputs */
.input-group{margin-bottom:var(--space-md)}
.input-label{display:block;font-size:var(--font-sm);font-weight:600;margin-bottom:var(--space-xs);color:var(--c-text-secondary)}
.input{
  width:100%;padding:12px 14px;background:var(--c-surface);border:1.5px solid var(--c-border);
  border-radius:var(--radius-md);font-size:var(--font-md);transition:border-color .15s;
}
.input:focus{border-color:var(--c-primary);box-shadow:0 0 0 3px var(--c-primary-light)}
.input-error{border-color:var(--c-danger)!important}
.error-text{color:var(--c-danger);font-size:var(--font-xs);margin-top:var(--space-xs)}
textarea.input{min-height:100px;resize:vertical}
.input-with-icon{position:relative}
.input-with-icon .input{padding-inline-start:40px}
.input-with-icon .input-icon{position:absolute;top:50%;inset-inline-start:12px;transform:translateY(-50%);color:var(--c-text-muted)}

/* Cards */
.card{
  background:var(--c-surface);border-radius:var(--radius-lg);
  border:1px solid var(--c-border);overflow:hidden;
}
.card-padded{padding:var(--space-md)}
.card-hover{cursor:pointer;transition:box-shadow .15s}
.card-hover:hover{box-shadow:var(--shadow-md)}

/* Badge */
.badge{
  display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--radius-full);
  font-size:var(--font-xs);font-weight:600;white-space:nowrap;
}
.badge-primary{background:var(--c-primary-light);color:var(--c-primary)}
.badge-success{background:var(--c-success-light);color:var(--c-success)}
.badge-warning{background:var(--c-warning-light);color:var(--c-warning)}
.badge-danger{background:var(--c-danger-light);color:var(--c-danger)}
.badge-info{background:var(--c-info-light);color:var(--c-info)}
.badge-neutral{background:#f1f5f9;color:var(--c-text-secondary)}

/* Avatar */
.avatar{
  width:40px;height:40px;border-radius:var(--radius-full);
  background:var(--c-primary-light);color:var(--c-primary);
  display:flex;align-items:center;justify-content:center;font-weight:700;
  font-size:var(--font-md);overflow:hidden;flex-shrink:0;
}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-sm{width:32px;height:32px;font-size:var(--font-sm)}
.avatar-lg{width:56px;height:56px;font-size:var(--font-xl)}
.avatar-xl{width:80px;height:80px;font-size:var(--font-xxl)}

/* Status dot */
.status-dot{
  width:10px;height:10px;border-radius:50%;border:2px solid var(--c-surface);
  position:absolute;bottom:0;inset-inline-end:0;
}
.status-dot.online{background:var(--c-success)}
.status-dot.offline{background:var(--c-text-muted)}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:var(--space-xxl) var(--space-md);text-align:center;
}
.empty-state .empty-icon{font-size:48px;margin-bottom:var(--space-md)}
.empty-state .empty-title{font-size:var(--font-lg);font-weight:600;margin-bottom:var(--space-sm)}
.empty-state .empty-text{color:var(--c-text-secondary);max-width:280px}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-line{height:14px;margin-bottom:8px;border-radius:4px}
.skeleton-line.w-60{width:60%}
.skeleton-line.w-80{width:80%}
.skeleton-line.w-40{width:40%}
.skeleton-circle{border-radius:50%}

/* Chips / filter tabs */
.chip-row{display:flex;gap:var(--space-sm);overflow-x:auto;padding:var(--space-sm) var(--space-md);-ms-overflow-style:none;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{
  padding:8px 16px;border-radius:var(--radius-full);font-size:var(--font-sm);font-weight:600;
  cursor:pointer;white-space:nowrap;border:1.5px solid var(--c-border);color:var(--c-text-secondary);
  transition:all .15s;
}
.chip.active{background:var(--c-primary);color:#fff;border-color:var(--c-primary)}

/* Category grid */
.category-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-md);padding:var(--space-md)}
.category-card{
  display:flex;flex-direction:column;align-items:center;gap:var(--space-sm);
  padding:var(--space-lg) var(--space-md);background:var(--c-surface);
  border-radius:var(--radius-lg);border:1px solid var(--c-border);cursor:pointer;
  transition:all .15s;text-align:center;
}
.category-card:hover{box-shadow:var(--shadow-md);border-color:var(--c-primary)}
.category-card .cat-icon{font-size:32px}
.category-card .cat-name{font-weight:600;font-size:var(--font-sm)}

/* Order card */
.order-card{
  padding:var(--space-md);border-bottom:1px solid var(--c-border);
  cursor:pointer;transition:background .15s;
}
.order-card:hover{background:var(--c-surface-hover)}
.order-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-sm);margin-bottom:var(--space-sm)}
.order-card-title{font-weight:600;font-size:var(--font-md)}
.order-card-meta{display:flex;gap:var(--space-md);font-size:var(--font-sm);color:var(--c-text-secondary);flex-wrap:wrap}
.order-card-price{font-weight:700;color:var(--c-text);font-size:var(--font-md)}

/* Quote card */
.quote-card{
  padding:var(--space-md);background:var(--c-surface);border:1px solid var(--c-border);
  border-radius:var(--radius-lg);margin-bottom:var(--space-sm);
}
.quote-card-header{display:flex;align-items:center;gap:var(--space-sm);margin-bottom:var(--space-sm)}
.quote-card-price{font-size:var(--font-xl);font-weight:700;color:var(--c-primary)}
.quote-card-actions{display:flex;gap:var(--space-sm);margin-top:var(--space-md)}

/* Chat */
.chat-container{display:flex;flex-direction:column;height:100%}
.chat-messages{flex:1;overflow-y:auto;padding:var(--space-md);display:flex;flex-direction:column;gap:var(--space-sm)}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:var(--radius-lg);font-size:var(--font-md);line-height:1.4;word-break:break-word}
.msg-mine{align-self:flex-end;background:var(--c-primary);color:#fff;border-bottom-right-radius:4px}
html[dir="rtl"] .msg-mine{border-bottom-right-radius:var(--radius-lg);border-bottom-left-radius:4px}
.msg-theirs{align-self:flex-start;background:#f1f5f9;color:var(--c-text);border-bottom-left-radius:4px}
html[dir="rtl"] .msg-theirs{border-bottom-left-radius:var(--radius-lg);border-bottom-right-radius:4px}
.msg-time{font-size:var(--font-xs);color:var(--c-text-muted);margin-top:2px}
.msg-system{align-self:center;background:var(--c-info-light);color:var(--c-info);font-size:var(--font-sm);text-align:center;border-radius:var(--radius-full);padding:6px 16px}
.chat-input-bar{
  display:flex;align-items:center;gap:var(--space-sm);padding:var(--space-sm) var(--space-md);
  background:var(--c-surface);border-top:1px solid var(--c-border);padding-bottom:calc(var(--space-sm) + var(--safe-bottom));
}
.chat-input{
  flex:1;padding:10px 14px;background:var(--c-bg);border:1px solid var(--c-border);
  border-radius:var(--radius-full);max-height:100px;
}
.chat-send{
  width:40px;height:40px;border-radius:50%;background:var(--c-primary);color:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}
.chat-send:hover{background:var(--c-primary-hover)}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-md)}
.stat-card{
  padding:var(--space-md);background:var(--c-surface);border-radius:var(--radius-lg);
  border:1px solid var(--c-border);text-align:center;
}
.stat-value{font-size:var(--font-xxl);font-weight:700;color:var(--c-primary)}
.stat-label{font-size:var(--font-sm);color:var(--c-text-secondary);margin-top:var(--space-xs)}

/* Settings row */
.settings-list{background:var(--c-surface);border-radius:var(--radius-lg);border:1px solid var(--c-border);overflow:hidden}
.settings-item{
  display:flex;align-items:center;gap:var(--space-md);padding:14px var(--space-md);
  cursor:pointer;transition:background .15s;border-bottom:1px solid var(--c-border);
}
.settings-item:last-child{border-bottom:none}
.settings-item:hover{background:var(--c-surface-hover)}
.settings-item .si-icon{font-size:20px;width:28px;text-align:center}
.settings-item .si-text{flex:1;font-weight:500}
.settings-item .si-chevron{color:var(--c-text-muted);font-size:18px}

/* Toggle switch */
.toggle{
  width:48px;height:28px;border-radius:14px;background:var(--c-border);
  position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;
}
.toggle.on{background:var(--c-primary)}
.toggle::after{
  content:'';position:absolute;top:3px;inset-inline-start:3px;
  width:22px;height:22px;border-radius:50%;background:#fff;
  transition:transform .2s;box-shadow:var(--shadow-sm);
}
.toggle.on::after{transform:translateX(20px)}
html[dir="rtl"] .toggle.on::after{transform:translateX(-20px)}

/* Star rating */
.stars{display:flex;gap:2px}
.star{font-size:22px;cursor:pointer;color:var(--c-border);transition:color .1s}
.star.filled{color:#f59e0b}

/* Modal / Bottom sheet */
.modal-overlay{
  position:fixed;inset:0;background:var(--c-overlay);z-index:100;
  display:none;align-items:flex-end;justify-content:center;
  animation:fadeOverlay .2s ease;
}
.modal-overlay.open{display:flex}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
.modal-sheet{
  background:var(--c-surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  width:100%;max-width:500px;max-height:85vh;overflow-y:auto;
  padding:var(--space-lg);padding-bottom:calc(var(--space-lg) + var(--safe-bottom));
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:36px;height:4px;background:var(--c-border);border-radius:2px;margin:0 auto var(--space-md)}
.modal-title{font-size:var(--font-lg);font-weight:700;margin-bottom:var(--space-md)}

/* Map */
#map-container{width:100%;height:100%;min-height:300px}
.leaflet-container{width:100%;height:100%;border-radius:0}

/* Spinner */
.spinner{
  width:24px;height:24px;border:3px solid var(--c-border);border-top-color:var(--c-primary);
  border-radius:50%;animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-center{display:flex;align-items:center;justify-content:center;padding:var(--space-xxl)}

/* Toast */
.toast{
  position:fixed;top:calc(20px + var(--safe-top));left:50%;transform:translateX(-50%);
  padding:12px 24px;border-radius:var(--radius-md);color:#fff;font-weight:600;
  z-index:200;animation:toastIn .3s ease;pointer-events:none;
  font-size:var(--font-sm);max-width:90%;text-align:center;
}
.toast-success{background:var(--c-success)}
.toast-error{background:var(--c-danger)}
.toast-info{background:var(--c-info)}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}

/* Search bar */
.search-bar{
  display:flex;align-items:center;gap:var(--space-sm);padding:10px 14px;
  background:var(--c-bg);border:1px solid var(--c-border);border-radius:var(--radius-full);
  margin:var(--space-md);
}
.search-bar input{flex:1;background:none;font-size:var(--font-md)}
.search-bar .search-icon{color:var(--c-text-muted);font-size:18px}

/* Timeline / steps */
.timeline{display:flex;flex-direction:column;gap:0;padding:var(--space-md)}
.timeline-step{display:flex;align-items:flex-start;gap:var(--space-md);position:relative;padding-bottom:var(--space-lg)}
.timeline-step:last-child{padding-bottom:0}
.timeline-step::before{
  content:'';position:absolute;inset-inline-start:15px;top:32px;bottom:0;
  width:2px;background:var(--c-border);
}
.timeline-step:last-child::before{display:none}
.timeline-dot{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;z-index:1;
}
.timeline-dot.done{background:var(--c-success);color:#fff}
.timeline-dot.current{background:var(--c-primary);color:#fff}
.timeline-dot.pending{background:var(--c-bg);color:var(--c-text-muted);border:2px solid var(--c-border)}
.timeline-content{flex:1}
.timeline-title{font-weight:600;font-size:var(--font-md)}
.timeline-desc{font-size:var(--font-sm);color:var(--c-text-secondary)}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:var(--space-sm);height:160px;padding:var(--space-md)}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:var(--space-xs)}
.bar-fill{width:100%;background:var(--c-primary);border-radius:var(--radius-sm) var(--radius-sm) 0 0;min-height:4px;transition:height .3s}
.bar-label{font-size:var(--font-xs);color:var(--c-text-secondary)}

/* Section header */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-md) var(--space-md) var(--space-sm);
}
.section-title{font-size:var(--font-lg);font-weight:700}
.section-link{font-size:var(--font-sm);color:var(--c-primary);font-weight:600;cursor:pointer}

/* Horizontal scroll list */
.h-scroll{display:flex;gap:var(--space-md);overflow-x:auto;padding:0 var(--space-md) var(--space-md);-ms-overflow-style:none;scrollbar-width:none}
.h-scroll::-webkit-scrollbar{display:none}
.h-scroll-card{min-width:260px;max-width:300px;flex-shrink:0}

/* KYC status banner */
.kyc-banner{
  display:flex;align-items:center;gap:var(--space-md);padding:var(--space-md);
  border-radius:var(--radius-lg);margin-bottom:var(--space-md);
}
.kyc-banner.not_submitted{background:var(--c-warning-light);color:var(--c-warning)}
.kyc-banner.pending{background:var(--c-info-light);color:var(--c-info)}
.kyc-banner.approved{background:var(--c-success-light);color:var(--c-success)}
.kyc-banner.rejected{background:var(--c-danger-light);color:var(--c-danger)}

/* OTP Input */
.otp-row{display:flex;gap:var(--space-sm);justify-content:center;margin:var(--space-lg) 0}
.otp-cell{
  width:48px;height:56px;text-align:center;font-size:var(--font-xl);font-weight:700;
  border:2px solid var(--c-border);border-radius:var(--radius-md);background:var(--c-surface);
}
.otp-cell:focus{border-color:var(--c-primary);box-shadow:0 0 0 3px var(--c-primary-light)}
.otp-cell.error{border-color:var(--c-danger);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Subscription cards */
.plan-card{
  padding:var(--space-lg);background:var(--c-surface);border:2px solid var(--c-border);
  border-radius:var(--radius-lg);text-align:center;cursor:pointer;transition:all .2s;
}
.plan-card.selected{border-color:var(--c-primary);background:var(--c-primary-light)}
.plan-card.popular{position:relative}
.plan-card.popular::before{
  content:'⭐';position:absolute;top:-12px;inset-inline-end:12px;
  background:var(--c-warning);color:#fff;padding:2px 10px;border-radius:var(--radius-full);font-size:var(--font-xs);
}
.plan-price{font-size:var(--font-xxl);font-weight:800;color:var(--c-primary);margin:var(--space-sm) 0}
.plan-period{font-size:var(--font-sm);color:var(--c-text-secondary)}
.plan-features{list-style:none;padding:0;margin:var(--space-md) 0;text-align:start}
.plan-features li{padding:var(--space-xs) 0;font-size:var(--font-sm);color:var(--c-text-secondary)}
.plan-features li::before{content:'✓ ';color:var(--c-success);font-weight:700}

/* Provider card (explore) */
.provider-card{
  display:flex;align-items:center;gap:var(--space-md);padding:var(--space-md);
  border-bottom:1px solid var(--c-border);cursor:pointer;transition:background .15s;
}
.provider-card:hover{background:var(--c-surface-hover)}
.provider-info{flex:1}
.provider-name{font-weight:600}
.provider-meta{display:flex;gap:var(--space-sm);font-size:var(--font-sm);color:var(--c-text-secondary);flex-wrap:wrap;margin-top:2px}

/* Notification badge */
.notif-badge{
  position:absolute;top:-2px;inset-inline-end:-2px;
  min-width:18px;height:18px;padding:0 5px;border-radius:9px;
  background:var(--c-danger);color:#fff;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}

/* Photo preview grid */
.photo-grid{display:flex;gap:var(--space-sm);flex-wrap:wrap;margin:var(--space-sm) 0}
.photo-thumb{
  width:72px;height:72px;border-radius:var(--radius-md);overflow:hidden;
  position:relative;border:1px solid var(--c-border);
}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .remove-photo{
  position:absolute;top:2px;inset-inline-end:2px;width:20px;height:20px;
  border-radius:50%;background:var(--c-danger);color:#fff;font-size:12px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}

/* Audit log row */
.audit-row{
  padding:var(--space-sm) var(--space-md);border-bottom:1px solid var(--c-border);
  font-size:var(--font-sm);
}
.audit-action{font-weight:600;color:var(--c-primary)}
.audit-actor{color:var(--c-text-secondary)}
.audit-time{color:var(--c-text-muted);font-size:var(--font-xs)}

/* Route line on map */
.route-info{
  position:absolute;bottom:var(--space-md);left:var(--space-md);right:var(--space-md);
  z-index:500;background:var(--c-surface);border-radius:var(--radius-lg);
  padding:var(--space-md);box-shadow:var(--shadow-lg);
}
.route-stats{display:flex;gap:var(--space-lg);justify-content:center}
.route-stat{text-align:center}
.route-stat-value{font-size:var(--font-lg);font-weight:700}
.route-stat-label{font-size:var(--font-xs);color:var(--c-text-secondary)}

/* Responsive */
@media(min-width:768px){
  #app{max-width:480px;margin:0 auto;border-inline:1px solid var(--c-border);height:100vh}
  .category-grid{grid-template-columns:repeat(3,1fr)}
  .stats-grid{grid-template-columns:repeat(4,1fr)}
}
</style>

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function formatCurrency(amount, currency) {
  try {
    return new Intl.NumberFormat(state.lang === 'ar' ? 'ar-SA' : state.lang === 'no' ? 'nb-NO' : state.lang === 'sv' ? 'sv-SE' : 'en-US', {
      style: 'currency', currency: currency || 'SAR', minimumFractionDigits: 0, maximumFractionDigits: 2
    }).format(amount || 0);
  } catch { return `${amount} ${currency}`; }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const loc = state.lang === 'ar' ? 'ar-SA' : state.lang === 'no' ? 'nb-NO' : state.lang === 'sv' ? 'sv-SE' : 'en-US';
  return d.toLocaleDateString(loc, { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return t('today');
  if (mins < 60) return `${mins}m ${t('ago')}`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ${t('ago')}`;
  const days = Math.floor(hrs / 24);
  if (days === 1) return t('yesterday');
  return `${days}d ${t('ago')}`;
}

function statusBadge(status) {
  const map = {
    pending: 'badge-warning', quoted: 'badge-info', confirmed: 'badge-primary',
    payment_pending: 'badge-warning', in_progress: 'badge-primary',
    completed: 'badge-success', closed: 'badge-neutral',
    cancelled: 'badge-danger', disputed: 'badge-danger'
  };
  return `<span class="badge ${map[status] || 'badge-neutral'}">${t('status_' + status)}</span>`;
}

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function showToast(msg, type = 'success') {

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

/* ============================================

   ============================================ */
function navigate(route, params = {}) {
  if (state.route !== route) {
    state.routeHistory.push({ route: state.route, params: state.routeParams });
  }
  state.route = route;
  state.routeParams = params;
  window.location.hash = route;
  render();
}

function goBack() {
  const prev = state.routeHistory.pop();
  if (prev) {
    state.route = prev.route;
    state.routeParams = prev.params;
    window.location.hash = prev.route;
    render();
  }
}

function getDefaultRoute() {
  if (!state.user) return 'login';
  const role = state.profile?.role;
  if (role === 'admin' || role === 'superadmin') return 'admin-dashboard';
  if (role === 'provider') return 'provider-dashboard';
  return 'home';
}

/* ============================================
   DISPATCH SCORING ENGINE
   ============================================ */
function calculateDispatchScore(provider, orderLat, orderLng) {
  const ratingScore = provider.avg_rating || CONFIG.BAYESIAN_M;
  const responseScore = Math.max(0, 1 - (provider.avg_response_minutes || 30) / 120);
  const acceptanceScore = provider.acceptance_rate || 0.8;
  const completedScore = Math.min(1, (provider.completed_orders || 0) / 50);
  const distanceKm = haversine(orderLat, orderLng, provider.location_lat, provider.location_lng);
  const distanceScore = Math.max(0, 1 - distanceKm / 50);

  let boostMultiplier = 1.0;
  if (provider.has_active_boost) boostMultiplier = 1.20;
  if ((provider.completed_orders || 0) < 10) boostMultiplier *= 1.10;

  const score = (
    ratingScore * 0.30 +
    responseScore * 0.20 +
    acceptanceScore * 0.15 +
    completedScore * 0.10 +
    distanceScore * 0.25
  ) * boostMultiplier;

  return { score: Math.round(score * 1000) / 1000, distanceKm: Math.round(distanceKm * 10) / 10 };
}

function haversine(lat1, lng1, lat2, lng2) {
  if (!lat1 || !lng1 || !lat2 || !lng2) return 999;
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

async function dispatchToProviders(orderId, orderLat, orderLng, categoryId) {
  const { data: providers } = await db.from('provider_profiles')
    .select('*, profiles!inner(display_name, kyc_status)')
    .eq('is_available', true).eq('is_verified', true);
  if (!providers || providers.length === 0) return [];

  const { data: boosts } = await db.from('boosts')
    .select('provider_id').eq('active', true);
  const boostedIds = new Set((boosts || []).map(b => b.provider_id));

  const scored = providers.map(p => ({
    ...p,
    has_active_boost: boostedIds.has(p.id),
    ...calculateDispatchScore({ ...p, has_active_boost: boostedIds.has(p.id) }, orderLat, orderLng)
  }));

  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, CONFIG.DISPATCH_CAP);
}

/* ============================================
   OSRM ROUTING
   ============================================ */
async function getRoute(fromLat, fromLng, toLat, toLng, mode = 'driving') {
  const profile = mode === 'walking' ? 'foot' : 'car';
  const url = `https://router.project-osrm.org/route/v1/${profile}/${fromLng},${fromLat};${toLng},${toLat}?overview=full&geometries=geojson`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.code === 'Ok' && data.routes.length > 0) {
      const route = data.routes[0];
      return {
        distanceKm: Math.round(route.distance / 100) / 10,
        durationMin: Math.round(route.duration / 60),
        geometry: route.geometry
      };
    }
  } catch (e) { console.error('OSRM error:', e); }
  return null;
}

let routeLayer = null;
async function showRouteOnMap(map, fromLat, fromLng, toLat, toLng) {
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  const walkRoute = await getRoute(fromLat, fromLng, toLat, toLng, 'walking');
  const driveRoute = await getRoute(fromLat, fromLng, toLat, toLng, 'driving');
  if (driveRoute?.geometry) {
    const coords = driveRoute.geometry.coordinates.map(c => [c[1], c[0]]);
    routeLayer = L.polyline(coords, { color: '#2563eb', weight: 4, opacity: 0.8 }).addTo(map);
    map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
  }
  return { walking: walkRoute, driving: driveRoute };
}

}

async function requestNotificationPermission() {
  if (!('Notification' in window)) return false;
  const permission = await Notification.requestPermission();
  if (permission === 'granted') {
    await registerPushToken();
    return true;
  }
  return false;
}

async function registerPushToken() {
  if (!('serviceWorker' in navigator) || !state.user) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: 'YOUR_VAPID_PUBLIC_KEY'
    });
    const token = JSON.stringify(sub);
    await db.from('push_tokens').upsert({
      user_id: state.user.id, token, platform: 'web'
    }, { onConflict: 'user_id,token' });
  } catch (e) { console.error('Push registration failed:', e); }
}

  if (Notification.permission === 'granted') {
    new Notification(title, { body, icon: 'icon-192.png', badge: 'icon-192.png' });

}

/* ============================================
   PAYMENT PROCESSING
   ============================================ */
async function processPayment(orderId, method) {
  setLoading('payment', true);
  render();
  const o = state.currentOrder;
  if (!o) { setLoading('payment', false); return; }

  const country = state.profile?.country || 'SA';
  const countryConfig = CONFIG.SUPPORTED_COUNTRIES[country] || CONFIG.SUPPORTED_COUNTRIES.SA;
  const vatRate = countryConfig.vat;
  const subtotal = o.quoted_price || 0;
  const vat = subtotal * vatRate;
  const total = subtotal + vat;
  const commissionAmount = subtotal * CONFIG.DEFAULT_COMMISSION_RATE;
  const netAmount = subtotal - commissionAmount;

  const { data: payment, error } = await db.from('payments').insert({
    order_id: orderId,
    customer_id: o.customer_id,
    provider_id: o.provider_id,
    amount: total,
    commission: commissionAmount,
    net_amount: netAmount,
    status: 'initiated',
    method: method,
    currency: o.currency
  }).select().single();

  if (error) {
    showToast(t('payment_failed'), 'error');
    setLoading('payment', false);
    render();
    return;
  }

  await db.from('orders').update({
    status: 'payment_pending',
    payment_status: 'initiated',
    payment_method: method,
    commission_amount: commissionAmount,
    net_amount: netAmount,
    final_price: total
  }).eq('id', orderId);

  // Simulate payment capture (in production: Tap redirect)
  setTimeout(async () => {
    await db.from('payments').update({ status: 'captured', captured_at: new Date().toISOString() }).eq('id', payment.id);
    await db.from('orders').update({ status: 'in_progress', payment_status: 'captured' }).eq('id', orderId);
    setLoading('payment', false);
    showToast(t('payment_success'), 'success');
    showLocalNotification('WorkFix', t('escrow_held'));
    await loadOrder(orderId);
    navigate('order-detail', { orderId });
  }, 2000);
}

async function loadReportData(fromDate, toDate) {

  if (fromDate) q = q.gte('created_at', fromDate);
  if (toDate) q = q.lte('created_at', toDate + 'T23:59:59');
  const { data: payments } = await q;

  const { count: totalOrders } = await db.from('orders').select('*', { count: 'exact', head: true });
  const { count: cancelledOrders } = await db.from('orders').select('*', { count: 'exact', head: true }).eq('status', 'cancelled');
  const { count: newUsers } = await db.from('profiles').select('*', { count: 'exact', head: true });
  const { count: activeProviders } = await db.from('provider_profiles').select('*', { count: 'exact', head: true }).eq('is_available', true);
  const { count: disputeCount } = await db.from('disputes').select('*', { count: 'exact', head: true });

  const totalRevenue = (payments || []).reduce((s, p) => s + (p.amount || 0), 0);
  const totalCommission = (payments || []).reduce((s, p) => s + (p.commission || 0), 0);
  const avgOrderValue = payments?.length ? totalRevenue / payments.length : 0;
  const disputeRate = totalOrders ? ((disputeCount || 0) / totalOrders * 100).toFixed(1) : 0;

  // Weekly data for chart
  const weeklyData = [0,0,0,0,0,0,0];
  (payments || []).forEach(p => {
    const day = new Date(p.created_at).getDay();
    weeklyData[day] += p.amount || 0;
  });

  return {
    totalRevenue, totalCommission, totalOrders: totalOrders || 0,
    avgOrderValue, cancelledOrders: cancelledOrders || 0,
    disputeRate, newUsers: newUsers || 0,
    activeProviders: activeProviders || 0, weeklyData
  };
}

async function loadProviderDashboardData() {
  if (!state.user) return { pendingQuotes: 0, activeJobs: 0, earnedToday: 0 };
  const today = new Date().toISOString().split('T')[0];

  const [quotes, jobs, earnings] = await Promise.all([

    activeJobs: jobs.count || 0,
    earnedToday: (earnings.data || []).reduce((s, p) => s + (p.net_amount || 0), 0)

/* ============================================
   REALTIME SUBSCRIPTIONS
   ============================================ */
let realtimeChannels = [];

function setupRealtime() {
  cleanupRealtime();
  if (!state.user) return;

  // Listen to messages in current conversation
  if (state.currentConversation) {
    const ch = db.channel(`messages:${state.currentConversation}`)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'messages',
        filter: `conversation_id=eq.${state.currentConversation}`
      }, payload => {
        state.currentMessages.push(payload.new);
        render();
        const msgList = $('.chat-messages');
        if (msgList) msgList.scrollTop = msgList.scrollHeight;
      }).subscribe();
    realtimeChannels.push(ch);
  }

  // Listen to order updates
  const orderCh = db.channel('order-updates')
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public', table: 'orders'
    }, payload => {
      const idx = state.orders.findIndex(o => o.id === payload.new.id);
      if (idx >= 0) { state.orders[idx] = { ...state.orders[idx], ...payload.new }; render(); }
      if (state.currentOrder?.id === payload.new.id) {
        state.currentOrder = { ...state.currentOrder, ...payload.new };
        render();
      }
    }).subscribe();
  realtimeChannels.push(orderCh);
}

function cleanupRealtime() {
  realtimeChannels.forEach(ch => db.removeChannel(ch));
  realtimeChannels = [];
}

async function filterExploreCategory(categoryId) {

async function loadExploreProviders() {
  const { data: providers } = await db.from('provider_profiles')
    .select('*, profiles!inner(display_name, photo_url, kyc_status)')
    .eq('is_available', true).eq('is_verified', true);

  if (!providers || providers.length === 0) {
    state.routeParams.exploreProviders = [];
    render();
    return;
  }

  const userLat = state.routeParams.userLat || 24.7136;
  const userLng = state.routeParams.userLng || 46.6753;

  const { data: boosts } = await db.from('boosts').select('provider_id').eq('active', true);
  const boostedIds = new Set((boosts || []).map(b => b.provider_id));

  const scored = providers.map(p => {
    const s = calculateDispatchScore({ ...p, has_active_boost: boostedIds.has(p.id) }, userLat, userLng);
    return { ...p, ...s, has_active_boost: boostedIds.has(p.id) };
  });

  scored.sort((a, b) => b.score - a.score);
  state.routeParams.exploreProviders = scored.slice(0, CONFIG.DISPATCH_CAP);

  render();

  // Add markers to map
  setTimeout(() => {
    if (!exploreMap) return;
    scored.forEach(p => {
      if (p.location_lat && p.location_lng) {
        const marker = L.marker([p.location_lat, p.location_lng]).addTo(exploreMap);
        marker.bindPopup(`<b>${p.profiles?.display_name}</b><br>⭐ ${(p.avg_rating||4).toFixed(1)} · ${p.distanceKm} km`);
        marker.on('click', async () => {
          const routes = await showRouteOnMap(exploreMap, userLat, userLng, p.location_lat, p.location_lng);
          state.routeParams.routeInfo = routes;
          render();
        });
      }
    });
  }, 300);
}

async function submitKyc() {
  if (!kycFiles.front || !kycFiles.back) {
    showToast(t('kyc_not_submitted'), 'error');
    return;
  }
  const urls = {};
  if (kycFiles.front) urls.id_front = await uploadKycDocument(kycFiles.front, 'id_front');
  if (kycFiles.back) urls.id_back = await uploadKycDocument(kycFiles.back, 'id_back');
  if (kycFiles.license) urls.trade_license = await uploadKycDocument(kycFiles.license, 'trade_license');

  await db.from('profiles').update({
    kyc_status: 'pending',
    kyc_documents: urls
  }).eq('id', state.user.id);
  state.profile.kyc_status = 'pending';
  kycFiles = { front: null, back: null, license: null };
  showToast(t('done'), 'success');
  render();
}

async function loadReportPeriod(period) {
  state.routeParams.reportPeriod = period;
  const now = new Date();
  let fromDate, toDate;

  if (period === 'this_month') {
    fromDate = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    toDate = now.toISOString().split('T')[0];
  } else if (period === 'last_month') {
    fromDate = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString().split('T')[0];
    toDate = new Date(now.getFullYear(), now.getMonth(), 0).toISOString().split('T')[0];
  } else if (period === 'three_months') {
    fromDate = new Date(now.getFullYear(), now.getMonth() - 3, 1).toISOString().split('T')[0];
    toDate = now.toISOString().split('T')[0];
  } else {
    fromDate = new Date(now.getFullYear(), 0, 1).toISOString().split('T')[0];
    toDate = now.toISOString().split('T')[0];
  }

  const data = await loadReportData(fromDate, toDate);
  state.routeParams.reportData = data;
  render();
}

   ============================================ */
function switchLanguage(lang) {
  state.lang = lang;
  const dir = I18N[lang]?.dir || 'ltr';
  document.documentElement.lang = lang;
  document.documentElement.dir = dir;
  localStorage.setItem('workfix_lang', lang);
  render();
}

function detectLanguage() {
  const saved = localStorage.getItem('workfix_lang');
  if (saved && I18N[saved]) return saved;
  const browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if (browserLang.startsWith('ar')) return 'ar';
  if (browserLang.startsWith('nb') || browserLang.startsWith('nn') || browserLang.startsWith('no')) return 'no';
  if (browserLang.startsWith('sv')) return 'sv';
  return 'en';
}

function initOrderMap() {

function initExploreMap() {

function useMyLocation() {

  navigator.geolocation.getCurrentPosition(pos => {

    state.routeParams.lng = lng;
    if (orderMap) {

      orderMarker = L.marker([lat, lng]).addTo(orderMap);
    }

    if (addrInput) addrInput.value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;

let otpTimer = 59;
let otpInterval = null;

function renderPhoneVerify() {
  const phone = state.routeParams.phone || '+966...';
  return `
    <div class="screen active" style="justify-content:center">
      <div class="content-padded" style="max-width:400px;margin:0 auto;width:100%;text-align:center">
        <div style="font-size:48px;margin-bottom:var(--space-md)">📱</div>
        <h2 style="margin-bottom:var(--space-sm)">${t('otp_title')}</h2>
        <p style="color:var(--c-text-secondary);margin-bottom:var(--space-lg)">${t('otp_subtitle')} ${phone}</p>
        <div class="otp-row" id="otp-row">
          ${[0,1,2,3,4,5].map(i => `
            <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" id="otp-${i}"
                   oninput="handleOtpInput(${i})" onkeydown="handleOtpKeydown(event,${i})">
          `).join('')}
        </div>
        <div id="otp-timer" style="color:var(--c-text-secondary);margin-bottom:var(--space-lg)">
          ${t('otp_resend_in')} <span id="otp-countdown">0:59</span>
        </div>
        <button class="btn btn-ghost btn-full" id="otp-resend-btn" disabled onclick="resendOtp()">${t('otp_resend')}</button>
        <button class="btn btn-secondary btn-full" style="margin-top:var(--space-sm)" onclick="goBack()">${t('back')}</button>
      </div>
    </div>`;
}

function handleOtpInput(idx) {
  const cell = $(`#otp-${idx}`);
  if (!cell) return;
  cell.value = cell.value.replace(/[^0-9]/g, '').slice(-1);
  if (cell.value && idx < 5) $(`#otp-${idx + 1}`)?.focus();
  if (idx === 5 && cell.value) verifyOtp();
}

function handleOtpKeydown(e, idx) {
  if (e.key === 'Backspace' && !e.target.value && idx > 0) {
    $(`#otp-${idx - 1}`)?.focus();
  }
}

function getOtpValue() {
  return [0,1,2,3,4,5].map(i => $(`#otp-${i}`)?.value || '').join('');
}

async function verifyOtp() {
  const code = getOtpValue();
  if (code.length !== 6) return;

  const { data, error } = await db.auth.verifyOtp({
    phone: state.routeParams.phone,
    token: code,
    type: 'sms'
  });

  if (error) {
    showToast(t('otp_error'), 'error');
    $$('.otp-cell').forEach(c => c.classList.add('error'));
    setTimeout(() => $$('.otp-cell').forEach(c => c.classList.remove('error')), 600);
    return;
  }

  await loadUserProfile();
  navigate(getDefaultRoute());
}

function startOtpTimer() {
  otpTimer = 59;
  clearInterval(otpInterval);
  otpInterval = setInterval(() => {
    otpTimer--;
    const el = $('#otp-countdown');
    if (el) el.textContent = `0:${otpTimer.toString().padStart(2, '0')}`;
    if (otpTimer <= 0) {
      clearInterval(otpInterval);
      const btn = $('#otp-resend-btn');
      if (btn) btn.disabled = false;
    }
  }, 1000);
}

async function resendOtp() {
  const phone = state.routeParams.phone;
  if (!phone) return;
  await db.auth.signInWithOtp({ phone });
  startOtpTimer();
  const btn = $('#otp-resend-btn');
  if (btn) btn.disabled = true;
  showToast(t('done'), 'success');
}

        <div class="stat-card"><div class="stat-value">${v}</div><div class="stat-label">${labels[i]}</div></div>
      `).join('');
    });
  }
  if (state.route === 'provider-dashboard') {
    loadProviderDashboardData().then(data => {
      const cards = $$('.stat-card .stat-value');
      if (cards.length >= 3) {
        cards[0].textContent = data.pendingQuotes;
        cards[1].textContent = data.activeJobs;
        cards[2].textContent = formatCurrency(data.earnedToday, CONFIG.SUPPORTED_COUNTRIES[state.profile?.country || 'SA']?.currency || 'SAR');
      }
    });
    loadIncomingRequests().then(orders => {
      const el = $('#incoming-requests');
      if (!el || !orders.length) return;
      el.innerHTML = orders.map(o => `
        <div class="order-card" onclick="navigate('quote-submit',{orderId:'${o.id}'})">
          <div class="order-card-top">
            <div class="order-card-title">${o.title}</div>
            ${statusBadge(o.status)}
          </div>
          <div class="order-card-meta">
            <span>📍 ${o.address || ''}</span>
            <span>🕐 ${timeAgo(o.created_at)}</span>
          </div>
          ${o.budget ? `<div class="order-card-price">${formatCurrency(o.budget, o.currency)}</div>` : ''}
        </div>
      `).join('');
    });
  }
  if (state.route === 'admin-reports' && !state.routeParams.reportData) {
    loadReportPeriod('this_month');
  }

  // Bind events
  bindEvents();
}

function bindEvents() {
  const loginBtn = $('#login-btn');
  if (loginBtn) {
    loginBtn.onclick = () => {
      const email = $('#login-email')?.value;
      const password = $('#login-password')?.value;
      if (email && password) handleLogin(email, password);
    };
  }

  const registerBtn = $('#register-btn');
  if (registerBtn) {
    registerBtn.onclick = () => {
      const name = $('#reg-name')?.value;
      const email = $('#reg-email')?.value;
      const password = $('#reg-password')?.value;
      const confirm = $('#reg-confirm')?.value;
      const terms = $('#reg-terms')?.checked;
      const role = state.routeParams.selectedRole || 'customer';
      if (!name || name.length < 2) { showToast('Name must be at least 2 characters', 'error'); return; }
      if (!email) { showToast('Email is required', 'error'); return; }
      if (!password || password.length < 8) { showToast('Password must be at least 8 characters', 'error'); return; }
      if (password !== confirm) { showToast('Passwords do not match', 'error'); return; }
      if (!terms) { showToast('Please agree to the terms', 'error'); return; }
      handleRegister(name, email, password, role);
    };
  }

  const registerLink = $('#register-link');
  if (registerLink) registerLink.onclick = () => navigate('register');

  const forgotLink = $('#forgot-link');
  if (forgotLink) forgotLink.onclick = () => navigate('forgot-password');

  const toggleLoginMethod = $('#toggle-login-method');
  if (toggleLoginMethod) toggleLoginMethod.onclick = () => navigate('login', { phoneLogin: !state.routeParams.phoneLogin });

  const resetBtn = $('#reset-btn');
  if (resetBtn) resetBtn.onclick = () => {
    const email = $('#reset-email')?.value;
    if (email) handleResetPassword(email);
  };

  const submitOrderBtn = $('#submit-order-btn');
  if (submitOrderBtn) {
    submitOrderBtn.onclick = () => {
      const title = $('#order-title')?.value;
      const desc = $('#order-desc')?.value;
      const budget = parseFloat($('#order-budget')?.value) || null;
      const catId = state.routeParams.categoryId || $('#order-category')?.value;
      if (!catId) { showToast('Select a category', 'error'); return; }
      if (!title || title.length < 3) { showToast('Title must be at least 3 characters', 'error'); return; }
      if (!desc || desc.length < 10) { showToast('Description must be at least 10 characters', 'error'); return; }
      createOrder({
        categoryId: catId, title, description: desc,
        lat: state.routeParams.lat || 24.7136,
        lng: state.routeParams.lng || 46.6753,
        address: $('#order-address')?.value || 'Location',
        geohash: 'u4pru', budget,
        currency: CONFIG.SUPPORTED_COUNTRIES[state.profile?.country || 'SA']?.currency || 'SAR'
      });
    };
  }

  // Enter key on login
  const loginPassword = $('#login-password');
  if (loginPassword) loginPassword.onkeydown = e => { if (e.key === 'Enter') loginBtn?.click(); };
  const loginEmail = $('#login-email');
  if (loginEmail) loginEmail.onkeydown = e => { if (e.key === 'Enter') $('#login-password')?.focus(); };
}

/* ============================================
   PWA INSTALL
   ============================================ */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r => { deferredPrompt = null; });
  }
}

/* ============================================
   INITIALIZATION
   ============================================ */
async function init() {
  try {
    // Language detection
    state.lang = detectLanguage();
    const dir = I18N[state.lang]?.dir || 'ltr';
    document.documentElement.lang = state.lang;
    document.documentElement.dir = dir;

    // Render login first
    render();

    if (!supabase) return;

    // Check existing session
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      await loadUserProfile();
      await Promise.all([loadCategories(), loadFlags(), loadOrders()]);
      navigate(getDefaultRoute());
      setupRealtime();
    }

    // Listen for auth changes
    db.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        await loadUserProfile();
        await Promise.all([loadCategories(), loadFlags(), loadOrders()]);
        navigate(getDefaultRoute());
        setupRealtime();
      } else if (event === 'SIGNED_OUT') {
        state.user = null;
        state.profile = null;
        cleanupRealtime();
        navigate('login');
      }
    });

    // Handle browser back/forward
    window.addEventListener('popstate', () => {
      const hash = window.location.hash.slice(1) || 'login';
      if (hash !== state.route) {
        state.route = hash;
        render();
      }
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  } catch (e) {
    console.error('Init error:', e);
  }
}

// Route-based data loading
const originalNavigate = navigate;
navigate = async function(route, params = {}) {
  originalNavigate(route, params);

  // Pre-fetch data for routes that need it
  if (route === 'home' && state.categories.length === 0) {
    await loadCategories();
    await loadOrders();
    render();
  }
  if (route === 'orders' || route === 'provider-orders') {
    await loadOrders(params.filter || 'all');
  }
  if (route === 'order-detail' && params.orderId) {
    await loadOrder(params.orderId);
    render();
  }
  if (route === 'payment' && params.orderId && !state.currentOrder) {
    await loadOrder(params.orderId);
    render();
  }
  if (route === 'quote-submit' && params.orderId) {
    await loadOrder(params.orderId);
    render();
  }
  if (route === 'provider-earnings') {
    await loadEarnings();
    render();
  }
  if (route === 'chat' && params.conversationId) {
    await loadMessages(params.conversationId);
    render();
  }
  if (route === 'explore' && state.categories.length === 0) {
    await loadCategories();
    render();
  }
};

// Start the app
init();
</script>
